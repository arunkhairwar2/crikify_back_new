services:
  server:
    build:
      context: .
      target: development-build-stage
      dockerfile: Dockerfile
    container_name: crikify_server
    # environment:
    #   DATABASE_URL: postgresql://postgres:2005@host.docker.internal:5432/test_db
    #   LOG_DIR: ./logs
    env_file:
      - .env.test
    ports:
      - '8000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  backend:
    driver: bridge
